# nginx-snippet.conf — DjangoPlay Site
# Paste these location blocks into your existing Nginx server block.
#
# Assumes your server block already handles:
#   - SSL termination (Let's Encrypt / certbot)
#   - Proxy to Django at /console/, /api/, /accounts/, etc.
#
# Existing structure (reference only — do not duplicate):
# server {
#     listen 443 ssl;
#     server_name djangoplay.org www.djangoplay.org;
#     ...existing SSL certs...
#     ...existing Django proxy...
# }


# ── Static site root ────────────────────────────────────────────────────────

# Landing page: djangoplay.org/
location = / {
    root /var/www/djangoplay/landing;
    try_files /index.html =404;
}

# Developer portfolio: djangoplay.org/developer  (with or without trailing slash)
location = /developer {
    return 301 /developer/;
}

location = /developer/ {
    root /var/www/djangoplay/landing;
    try_files /developer.html =404;
}

# Static assets: CSS, JS, images, fonts
# Served from /var/www/djangoplay/landing/assets/
location /assets/ {
    root /var/www/djangoplay/landing;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    access_log off;

    # Gzip for text assets
    gzip_static on;
}

# Explicit favicon route (in case some browsers request it from /)
location = /favicon.ico {
    root /var/www/djangoplay/landing/assets/imgs/logo;
    try_files /dp-icon.png =404;
    access_log off;
    expires 30d;
}


# ── Security headers (add to entire server block if not already set) ────────
